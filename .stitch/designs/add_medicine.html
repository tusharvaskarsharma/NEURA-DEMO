<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#7c3bed",
            "background-light": "#f7f6f8",
            "background-dark": "#171121",
            "electric-blue": "#2A52BE",
          },
          fontFamily: {
            "display": ["Space Grotesk"]
          },
          borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .glass-morphism {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .heavy-glass {
      background: rgba(23, 17, 33, 0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    .scanner-line {
      height: 2px;
      background: linear-gradient(90deg, transparent, #2A52BE, #7c3bed, #2A52BE, transparent);
      box-shadow: 0 0 15px #7c3bed;
    }
    .ar-corner {
      width: 32px;
      height: 32px;
      border-color: #7c3bed;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark font-display text-slate-100 antialiased overflow-hidden h-screen">
<!-- Background Camera Feed Simulation -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-black/40 z-10"></div>
<img alt="Medicine box on a wooden table" class="w-full h-full object-cover blur-[2px]" data-alt="Blurred medicine box on a flat surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC122z729anqrFbOHEL1O-KM5aQdRArhwmYcYnWcAoOpaTUzecH9PPyw3tlVgPa_vHzX94fY1Kyzh_6bDhMlMQ2LGuBZ4UzqeCQPRzfBnrnfh7DLp13m_pqYGjzm4A46YvMsQqXwqRloVto38boPVakSo6A9fyzZSafysq8hxBwJv4SMD47x0ZzR6l2-LEMPImbIYM69PomGvV2Mxy4fO_jU3FAxtO452IVzTNQAmF23XCDn2UtocYd447pRpXdTG8V0rKBM_szJmU"/>
</div>
<div class="relative z-20 flex flex-col h-full">
<!-- TopAppBar -->
<header class="flex items-center justify-between p-6 pt-12">
<button class="flex items-center justify-center size-10 rounded-full glass-morphism text-slate-100">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-white drop-shadow-md">Add Medicine</h1>
<button class="flex items-center justify-center size-10 rounded-full glass-morphism text-slate-100">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
</header>
<!-- Center AR Viewfinder Area -->
<main class="flex-1 flex flex-col items-center justify-center p-8">
<div class="relative w-full aspect-square max-w-sm">
<!-- AR Brackets -->
<div class="absolute top-0 left-0 ar-corner border-t-4 border-l-4 rounded-tl-lg"></div>
<div class="absolute top-0 right-0 ar-corner border-t-4 border-r-4 rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 ar-corner border-b-4 border-l-4 rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 ar-corner border-b-4 border-r-4 rounded-br-lg"></div>
<!-- Scanning Laser Line -->
<div class="absolute top-1/2 left-4 right-4 scanner-line"></div>
<!-- Scanning Feedback -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="bg-white/5 backdrop-blur-sm px-4 py-2 rounded-full border border-white/10">
<div class="flex items-center gap-2">
<div class="size-2 bg-primary rounded-full animate-pulse"></div>
<span class="text-xs font-medium tracking-widest uppercase opacity-80">Analyzing...</span>
</div>
</div>
</div>
</div>
<!-- Tooltip -->
<div class="mt-12 glass-morphism px-6 py-3 rounded-full flex items-center gap-3 border border-white/20">
<span class="material-symbols-outlined text-primary text-sm">info</span>
<p class="text-sm font-medium text-slate-100">Position the medicine label within the frame</p>
</div>
</main>
<!-- Bottom Action Bar -->
<footer class="heavy-glass px-8 pb-12 pt-6 flex items-center justify-between rounded-t-[2.5rem]">
<!-- Manual Entry -->
<div class="flex flex-col items-center gap-1">
<button class="flex items-center justify-center size-12 rounded-full glass-morphism text-slate-100 mb-1">
<span class="material-symbols-outlined">keyboard</span>
</button>
<span class="text-[10px] font-bold uppercase tracking-wider opacity-60">Manual</span>
</div>
<!-- Large Gradient Capture Button -->
<div class="relative group">
<div class="absolute -inset-2 bg-gradient-to-r from-electric-blue to-primary rounded-full blur-md opacity-50"></div>
<button class="relative size-20 rounded-full bg-white flex items-center justify-center p-1.5 shadow-2xl">
<div class="w-full h-full rounded-full border-[3px] border-slate-900/5 flex items-center justify-center bg-gradient-to-br from-white to-slate-200">
<div class="size-6 bg-slate-900 rounded-sm"></div>
</div>
</button>
</div>
<!-- Gallery Thumbnail -->
<div class="flex flex-col items-center gap-1">
<button class="relative size-12 rounded-xl overflow-hidden glass-morphism border-2 border-white/20 mb-1">
<img alt="Gallery preview" class="w-full h-full object-cover grayscale-[0.5]" data-alt="Thumbnail of medical supplies" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTlf_J6ccbMPgcBqirgozyDX1d-5UCgaojcyBotEtgYMJB0GVEJbYOLyyYZ0U3i00HGvv5sJTukOhabcuM5C4NunlGvMHJC_YMUJy2ZRPqM6-5x_3gPz-wQl1TfOCZErMm4B6xS6zhWVeSu14NVsmM1V6vI7QmnwY294o5unLixmk_rGP7AztRi7h9prFZ301IQynpkTxaP_vNJEqIpXtOhsE_kuqU24lQ_zrayAokTu83pXze9QZjknPuc6VfZVhFZJQYV-1ZUqU"/>
<div class="absolute inset-0 bg-primary/20"></div>
</button>
<span class="text-[10px] font-bold uppercase tracking-wider opacity-60">Gallery</span>
</div>
</footer>
</div>
<!-- AR Overlay HUD Elements (Top Right) -->
<div class="absolute top-28 right-6 z-30 flex flex-col gap-4">
<div class="glass-morphism p-3 rounded-2xl flex flex-col items-center gap-2">
<span class="material-symbols-outlined text-electric-blue">distance</span>
<div class="h-[1px] w-4 bg-white/20"></div>
<span class="material-symbols-outlined text-white/40">auto_videocam</span>
</div>
</div>
<!-- AR Bottom HUD Labels -->
<div class="absolute bottom-40 left-0 w-full px-8 z-30 pointer-events-none">
<div class="flex justify-between items-end">
<div class="flex flex-col gap-0.5">
<span class="text-[10px] text-primary font-bold tracking-widest uppercase">Resolution</span>
<span class="text-lg font-display text-white">4K AR_SCAN</span>
</div>
<div class="flex flex-col items-end gap-0.5">
<span class="text-[10px] text-electric-blue font-bold tracking-widest uppercase">Target</span>
<span class="text-lg font-display text-white">Label_OCR v2</span>
</div>
</div>
</div>
</body></html>
